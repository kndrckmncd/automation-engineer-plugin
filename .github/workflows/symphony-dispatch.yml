name: Symphony Dispatch
run-name: "Symphony Dispatch — #${{ github.event.issue.number || inputs.issue-number }} (@${{ github.actor }})"

# Caller-stub workflow generated by gh-symphony.
#
# This thin wrapper invokes the reusable symphony-dispatch workflow from
# manulife-innersource/symphony@main. The full
# pipeline logic lives upstream — this file only declares triggers,
# permissions, and forwards inputs/secrets.
#
# Do not add job steps here. To update, run: gh symphony update

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue-number:
        description: Issue number to run the AI-SDLC pipeline against.
        required: true
        type: number
      dry-run:
        description: Run explore only; skip the explore comment and label swap.
        required: false
        type: boolean
        default: false

permissions:
  issues: write
  contents: write
  pull-requests: write

concurrency:
  group: symphony-${{ github.event.issue.number || inputs.issue-number }}
  cancel-in-progress: false

jobs:
  symphony-dispatch:
    name: Symphony Dispatch
    # No label filter here on purpose: the upstream reusable workflow filters
    # per-route from .symphony.yml (dispatch.trigger-label), so new routes can
    # be added upstream without re-onboarding consumer repos.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'issues'
    uses: manulife-innersource/symphony/.github/workflows/symphony-dispatch.yml@main
    with:
      issue-number: ${{ fromJSON(github.event.issue.number || inputs.issue-number) }}
      dry-run: ${{ inputs.dry-run || false }}
    secrets:
      COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
