name: Hello World
run-name: "Hello World — @${{ github.actor }}"

# Caller-stub workflow generated by gh-symphony.
#
# This thin wrapper invokes the reusable hello-world workflow from
# manulife-innersource/symphony@main. The full pipeline logic lives
# upstream — this file only declares triggers, permissions, and forwards
# inputs/secrets.
#
# Do not add job steps here. To update, run: gh symphony update

on:
  workflow_dispatch:
    inputs:
      greeting-name:
        description: Name to include in the greeting (leave blank to greet "the world").
        required: false
        type: string
        default: "the world"

permissions:
  contents: read
  copilot-requests: write

jobs:
  hello-world:
    name: Hello World
    uses: manulife-innersource/symphony/.github/workflows/hello-world.yml@main
    with:
      greeting-name: ${{ inputs.greeting-name }}
    secrets:
      COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
